name: Pipeline

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare release context
    runs-on: ubuntu-24.04
    outputs:
      release_tag: ${{ steps.prepare.outputs.release_tag }}
      is_release: ${{ steps.prepare.outputs.is_release }}
      version: ${{ steps.prepare.outputs.version }}
      prerelease: ${{ steps.prepare.outputs.prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect tag and validate versions
        id: prepare
        shell: bash
        run: |
          set -euo pipefail

          PKG_VERSION="$(jq -r .version package.json)"
          TAURI_VERSION="$(jq -r .version src-tauri/tauri.conf.json)"
          CARGO_VERSION="$(grep -m1 '^version = ' src-tauri/Cargo.toml | sed -E 's/version = "(.*)"/\1/')"

          if [[ "$PKG_VERSION" != "$TAURI_VERSION" || "$PKG_VERSION" != "$CARGO_VERSION" ]]; then
            echo "❌ Version mismatch detected"
            echo "package.json: $PKG_VERSION"
            echo "tauri.conf.json: $TAURI_VERSION"
            echo "Cargo.toml: $CARGO_VERSION"
            exit 1
          fi

          echo "✅ Version consistency: $PKG_VERSION"

          RELEASE_TAG="$(git tag --points-at "$GITHUB_SHA" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$' | head -n 1 || true)"

          if [[ -z "$RELEASE_TAG" ]]; then
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "release_tag=" >> "$GITHUB_OUTPUT"
            echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            {
              echo "## Pipeline mode"
              echo "- no release tag points at this commit"
              echo "- run checks/tests only"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          EXPECTED_TAG="v$PKG_VERSION"
          if [[ "$RELEASE_TAG" != "$EXPECTED_TAG" ]]; then
            echo "❌ Tag mismatch: detected $RELEASE_TAG, expected $EXPECTED_TAG"
            exit 1
          fi

          if ! grep -qE "^## ${RELEASE_TAG}$" CHANGELOG.md; then
            echo "❌ CHANGELOG.md missing bound heading: ## ${RELEASE_TAG}"
            exit 1
          fi

          IS_PRERELEASE=false
          if [[ "$RELEASE_TAG" == *-* ]]; then
            IS_PRERELEASE=true
          fi

          echo "is_release=true" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          echo "prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"

          {
            echo "## Pipeline mode"
            echo "- release tag: $RELEASE_TAG"
            echo "- changelog binding: found heading '## $RELEASE_TAG'"
            echo "- run checks/tests + build/release"
          } >> "$GITHUB_STEP_SUMMARY"

  quality:
    name: Quality checks
    needs: [prepare]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend type check
        run: |
          pnpm typecheck

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run sidecar tests
        working-directory: sidecar
        run: |
          pip install -r requirements-dev.txt
          python -m pytest tests/ -v

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: 'v1-rust'
          key: 'pipeline-${{ runner.os }}'
          workspaces: src-tauri -> target
          cache-all-crates: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libfuse2

      - name: Run Rust lint and tests
        working-directory: src-tauri
        run: |
          cargo clippy --all-targets --all-features -- -D warnings
          cargo test --all-targets --all-features

  build-sidecar:
    name: Build sidecar artifacts
    if: needs.prepare.outputs.is_release == 'true'
    needs: [prepare, quality]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar-name: mimicry-sidecar-x86_64-pc-windows-msvc.exe
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            sidecar-name: mimicry-sidecar-x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Build sidecar
        working-directory: sidecar
        shell: bash
        run: |
          pip install pyinstaller
          pip install -r requirements.txt
          pyinstaller --onefile --name mimicry-sidecar main.py
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            mv dist/mimicry-sidecar.exe "dist/${{ matrix.sidecar-name }}"
          else
            mv dist/mimicry-sidecar "dist/${{ matrix.sidecar-name }}"
          fi

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-${{ matrix.target }}
          path: sidecar/dist/${{ matrix.sidecar-name }}

  release:
    name: Build and publish release
    if: needs.prepare.outputs.is_release == 'true'
    needs: [prepare, quality, build-sidecar]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download sidecar
        uses: actions/download-artifact@v4
        with:
          name: sidecar-${{ matrix.target }}
          path: src-tauri/binaries/

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: 'v1-rust'
          key: 'release-${{ matrix.os }}-${{ matrix.target }}'
          workspaces: src-tauri -> target
          cache-all-crates: true

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libfuse2

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri and attach artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.prepare.outputs.release_tag }}
          releaseName: 'Release ${{ needs.prepare.outputs.release_tag }}'
          releaseBody: 'Draft release, will be updated from CHANGELOG.md later.'
          releaseDraft: true
          prerelease: ${{ needs.prepare.outputs.prerelease }}
          tauriScript: pnpm tauri
          includeUpdaterJson: true
          args: --target ${{ matrix.target }}

  update-release:
    name: Update release notes
    if: needs.prepare.outputs.is_release == 'true'
    needs: [prepare, release]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Generate notes from changelog and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.prepare.outputs.release_tag }}"
          VER="${{ needs.prepare.outputs.version }}"
          BUILDTIME="$(TZ=Asia/Shanghai date)"

          awk "/^## ${TAG//./\\.}$/{found=1; next} /^## v/{if(found) exit} found" CHANGELOG.md > release_notes.txt
          if [[ ! -s release_notes.txt ]]; then
            echo "See CHANGELOG.md for details." > release_notes.txt
          fi

          cat > release_body.md <<EOF
          $(cat release_notes.txt)

          ---
          Built at ${BUILDTIME}
          EOF

          gh release edit "$TAG" \
            --repo "${{ github.repository }}" \
            --title "Release $TAG" \
            --notes-file release_body.md \
            --draft=false \
            --prerelease=${{ needs.prepare.outputs.prerelease }}