name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-version:
    name: Validate release tag
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      prerelease: ${{ steps.get_version.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate versions match tag
        id: get_version
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"

          PKG_VERSION="$(jq -r .version package.json)"
          TAURI_VERSION="$(jq -r .version src-tauri/tauri.conf.json)"
          CARGO_VERSION="$(grep -m1 '^version = ' src-tauri/Cargo.toml | sed -E 's/version = "(.*)"/\1/')"

          for src in "package.json:$PKG_VERSION" "tauri.conf.json:$TAURI_VERSION" "Cargo.toml:$CARGO_VERSION"; do
            name="${src%%:*}"
            ver="${src##*:}"
            if [[ "$ver" != "$TAG_VERSION" ]]; then
              echo "::error::Tag version ($TAG_VERSION) does not match $name ($ver)"
              exit 1
            fi
          done

          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

          IS_PRERELEASE=false
          if [[ "$TAG_VERSION" == *-* ]]; then
            IS_PRERELEASE=true
          fi
          echo "prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Verify CHANGELOG entry
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if ! grep -qE "^## ${TAG}$" CHANGELOG.md; then
            echo "::error::CHANGELOG.md missing heading: ## ${TAG}"
            exit 1
          fi

  build-sidecar:
    name: Build sidecar (${{ matrix.os }})
    needs: [check-version]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar-name: mimicry-sidecar-x86_64-pc-windows-msvc.exe
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            sidecar-name: mimicry-sidecar-x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build sidecar
        working-directory: sidecar
        shell: bash
        run: |
          pip install pyinstaller
          pip install -r requirements.txt
          pyinstaller --onefile --name mimicry-sidecar main.py
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            mv dist/mimicry-sidecar.exe "dist/${{ matrix.sidecar-name }}"
          else
            mv dist/mimicry-sidecar "dist/${{ matrix.sidecar-name }}"
          fi

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-${{ matrix.target }}
          path: sidecar/dist/${{ matrix.sidecar-name }}

  build-tauri:
    name: Build Tauri (${{ matrix.os }})
    needs: [check-version, build-sidecar]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Download sidecar
        uses: actions/download-artifact@v4
        with:
          name: sidecar-${{ matrix.target }}
          path: src-tauri/binaries/

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libfuse2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri and attach artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "Mimicry v__VERSION__"
          releaseDraft: true
          prerelease: ${{ needs.check-version.outputs.prerelease }}
          tauriScript: pnpm tauri
          includeUpdaterJson: true
          args: --target ${{ matrix.target }}

  update-release:
    name: Publish release notes
    needs: [check-version, build-tauri]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="v${{ needs.check-version.outputs.version }}"
          VER="${{ needs.check-version.outputs.version }}"
          DL="https://github.com/${{ github.repository }}/releases/download/${TAG}"
          BUILDTIME="$(TZ=Asia/Shanghai date)"

          # Extract changelog section for current version
          awk "/^## ${TAG//./\\.}/{found=1; next} /^## v/{if(found) exit} found" CHANGELOG.md > release_notes.txt
          if [ ! -s release_notes.txt ]; then
            echo "Release ${TAG}" > release_notes.txt
          fi

          CHANGELOG=$(cat release_notes.txt)

          cat > release_body.md <<ENDOFBODY
          ${CHANGELOG}

          ## 下载

          ### Windows
          - [安装包 (msi)](${DL}/Mimicry_${VER}_x64-setup.exe)

          ### Linux
          - [DEB 包](${DL}/Mimicry_${VER}_amd64.deb)
          - [AppImage](${DL}/Mimicry_${VER}_amd64.AppImage)

          ---
          Built at ${BUILDTIME}
          ENDOFBODY

          gh release edit "${TAG}" \
            --repo "${{ github.repository }}" \
            --title "Mimicry ${TAG}" \
            --notes-file release_body.md \
            --draft=false \
            --prerelease=${{ needs.check-version.outputs.prerelease }}
